<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado PC/BA</title>

    <!-- Fonte Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <!-- Seu CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Simulado PC/BA</h1>

    <div class="controls">
        <div>
            <label for="disciplina">Filtrar por disciplina:</label>
            <select id="disciplina">
                <option value="todas">Todas</option>
                <option value="Direito Penal">Direito Penal</option>
                <option value="Direito Processual Penal">Direito Processual Penal</option>
                <option value="Legislação Especial (PC/BA)">Legislação Especial (PC/BA)</option>
                <option value="Constituição Federal">Constituição Federal</option>
                <option value="Direitos Humanos">Direitos Humanos</option>
                <option value="Língua Portuguesa">Língua Portuguesa</option>
                <option value="Informática">Informática</option>
                <option value="Raciocínio Lógico">Raciocínio Lógico</option>
                <option value="Estatuto da Criança e do Adolescente">Estatuto da Criança e do Adolescente</option>
                <option value="Código de Trânsito Brasileiro">Código de Trânsito Brasileiro</option>
                <option value="Noções de Investigação Policial">Noções de Investigação Policial</option>
                <option value="Juizados Especiais Criminais">Juizados Especiais Criminais</option>
                <option value="Estatuto do Desarmamento">Estatuto do Desarmamento</option>
                <option value="Ética no Serviço Público">Ética no Serviço Público</option>
                <option value="Medicina Legal">Medicina Legal</option>
                <option value="Noções de Contabilidade">Noções de Contabilidade</option>
            </select>
        </div>

        <button id="sortear">🎲 Sortear Questão</button>
    </div>

    <!-- Onde as questões aparecem -->
    <div id="questao-container" class="simulado"></div>

    <!-- Resultado -->
    <div id="resultado" class="resultado"></div>

    <!-- Botão finalizar (já preparado para seu CSS) -->
    <button class="btn-finalizar" id="finalizar">
        ✅ Finalizar Simulado
    </button>

    <footer class="rodape">
        desenvolvido por Edmile Lopes
    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
